<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <style>
        /* --- General Setup --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Itim', cursive, sans-serif; }

        body {
            background-color: #f0f4f2; color: #333333;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
            background-image: radial-gradient(#e0e8e4 2px, transparent 2px), radial-gradient(#e0e8e4 2px, transparent 2px);
            background-size: 40px 40px; background-position: 0 0, 20px 20px;
        }

        /* --- Page Management --- */
        .page-section {
            display: none; width: 100%; height: 100vh; position: absolute;
            top: 0; left: 0; justify-content: center; align-items: center;
            flex-direction: column; animation: fadeInPage 0.5s ease;
        }
        .page-section.active { display: flex; }
        @keyframes fadeInPage { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* --- Main Container (หน้าแรก) --- */
        .main-container {
            background-color: #ffffff; width: 90%; max-width: 450px;
            border-radius: 30px; padding: 35px 25px 45px 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08); text-align: center;
            border: 3px solid #f2f2f2; position: relative; z-index: 10;
        }

        .main-container::before, .main-container::after {
            content: ''; position: absolute; top: -25px; width: 75px; height: 75px;
            background-color: #ff99bb; border-radius: 50%; z-index: -1;
            background-image: radial-gradient(circle at center, #f5f5f5 35%, #ff99bb 40%);
        }
        .main-container::before { left: 35px; transform: rotate(-15deg); }
        .main-container::after { right: 35px; transform: rotate(15deg); }

        .paw {
            position: absolute; bottom: -20px; width: 50px; height: 35px;
            background-color: #ff99bb; border-radius: 50px 50px 30px 30px; z-index: 11;
        }
        .paw::before, .paw::after, .paw-center { content: ''; position: absolute; background-color: #ffffff; border-radius: 50%; }
        .paw::before { width: 12px; height: 14px; top: -5px; left: 6px; transform: rotate(-15deg); }
        .paw::after { width: 12px; height: 14px; top: -5px; right: 6px; transform: rotate(15deg); }
        .paw-center { width: 12px; height: 14px; top: -8px; left: 19px; }
        .paw-pad { position: absolute; width: 26px; height: 16px; background-color: #ffffff; border-radius: 50%; bottom: 6px; left: 12px; }
        .paw.left { left: 50px; } .paw.right { right: 50px; }

        h1 { color: #333333; font-size: 28px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* --- Image Wrapper --- */
        .image-frame {
            position: relative; width: 220px; height: 220px; margin: 0 auto 25px auto;
            border-radius: 20px; overflow: hidden; background: #fff; padding: 6px;
            box-shadow: 0 0 20px rgba(255, 153, 187, 0.4);
        }
        .image-frame::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #ff99bb);
            animation: rotateNeon 3s linear infinite;
        }
        @keyframes rotateNeon { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .image-frame-inner { position: relative; width: 100%; height: 100%; background: #fff; border-radius: 14px; overflow: hidden; z-index: 1; }
        .image-frame-inner img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .image-frame-inner img.active { display: block; animation: fadeIn 0.4s ease-in-out; }

        /* --- Buttons --- */
        .btn {
            display: block; width: 100%; background-color: #ffffff; color: #333333;
            border: 2px dashed #ff99bb; padding: 14px; margin-bottom: 12px;
            border-radius: 20px; font-size: 18px; text-decoration: none;
            cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .btn:hover { background-color: #fff5f7; transform: translateY(-2px); }
        .btn.selected { border: 2px solid #ff99bb; background-color: #ff99bb; box-shadow: 0 0 15px rgba(255, 153, 187, 0.4); color: #ffffff; font-weight: bold; }
        .btn-next { background-color: #ff99bb; color: #ffffff; margin-top: 25px; border: 2px solid #ff99bb; font-size: 20px; }
        .btn-next:hover { background-color: #ff7799; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* --- Loading Screen --- */
        .loading-bg { background-color: #ffffff; z-index: 100; }
        .loader { width: 50px; height: 50px; border: 6px solid #f3f3f3; border-top: 6px solid #ff99bb; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        .loading-text { font-size: 24px; font-weight: bold; color: #333; animation: pulse 1s infinite alternate; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- Strawberry Custom Loading Progress Bar --- */
        .progress-container { width: 80%; max-width: 300px; background: #ffe6ec; border: 3px solid #ff99bb; height: 35px; border-radius: 25px; padding: 3px; position: relative; display: flex; align-items: center; margin-bottom: 20px; }
        .progress-bar { width: 0%; height: 100%; background: #ff6699; border-radius: 20px; transition: width 0.1s linear; }
        .progress-strawberry { position: absolute; font-size: 26px; top: -5px; left: 0%; transform: translateX(-50%); transition: left 0.1s linear; }
        .progress-num { font-size: 22px; font-weight: bold; color: #ff6699; margin-top: 10px; }

        /* --- Floating Menu (หน้าเลือกปุ่ม) --- */
        .menu-title { font-size: 28px; margin-bottom: 40px; color: #333; text-shadow: 2px 2px 0 #fff; }
        .floating-btn {
            background: #ffffff; color: #333; font-size: 22px; font-weight: bold;
            padding: 20px 40px; margin: 15px; border-radius: 30px;
            border: 3px solid #ff99bb; cursor: pointer;
            box-shadow: 0 10px 0 #ff99bb, 0 15px 20px rgba(0,0,0,0.1);
            transition: all 0.2s; position: relative;
            animation: floatUpDown 3s ease-in-out infinite alternate;
        }
        .floating-btn:nth-child(2) { animation-delay: 1s; }
        .floating-btn:active { transform: translateY(10px); box-shadow: 0 0 0 #ff99bb; }
        @keyframes floatUpDown { 0% { transform: translateY(0); } 100% { transform: translateY(-15px); } }

        /* --- Scrollable Reading Page --- */
        .reading-box {
            background: #fff; width: 90%; max-width: 400px;
            border-radius: 20px; border: 4px solid #ff99bb; padding: 20px; position: relative; box-shadow: 0 0 20px rgba(255,255,255,0.8);
        }
        .reading-box::before { content: '🐼'; position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 45px; background: #fff; border-radius: 50%; padding: 0 10px; border: 4px solid #ff99bb; }
        .reading-title { font-size: 24px; text-align: center; margin-top: 15px; margin-bottom: 15px; border-bottom: 2px dashed #ccc; padding-bottom: 10px;}
        .scroll-content { max-height: 250px; overflow-y: auto; font-size: 20px; line-height: 1.6; text-align: left; padding-right: 10px; color: #444; }
        .scroll-content::-webkit-scrollbar { width: 8px; }
        .scroll-content::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .scroll-content::-webkit-scrollbar-thumb { background: #ff99bb; border-radius: 10px; }
        
        .btn-back { margin-top: 20px; background: #eee; color: #333; border: 2px dashed #ccc; }
        .btn-finish { background: #ff99bb; color: #fff; margin-top: 10px; border: none; }
        .btn-finish:hover { background: #ff7799; }

        /* =========================================
           หน้าเลือกสไตล์แพนด้าชมพู (ตารางชมพูนมอ่อน พื้นขาว)
           ========================================= */
        #page-dance {
            background-color: #ffffff;
            background-image: linear-gradient(#ffebf0 2px, transparent 2px), linear-gradient(90deg, #ffebf0 2px, transparent 2px);
            background-size: 40px 40px;
            position: relative;
            z-index: 1;
        }

        /* =========================================
           CHIBI PANDA CSS ART
           ========================================= */
        .chibi-container { text-align: center; z-index: 10; }
        .chibi-panda {
            position: relative; width: 140px; height: 180px; margin: 0 auto;
            transform-origin: bottom center;
        }
        
        .p-head { position: absolute; width: 120px; height: 95px; background: #fff; border: 5px solid #ff6699; border-radius: 50% 50% 45% 45%; top: 15px; left: 10px; z-index: 3; }
        .p-ear { position: absolute; width: 40px; height: 35px; background: #ff6699; border-radius: 50%; top: 5px; z-index: 1; }
        .p-ear.left { left: 5px; transform: rotate(-20deg); } .p-ear.right { right: 5px; transform: rotate(20deg); }
        .p-eye { position: absolute; width: 28px; height: 38px; background: #ff6699; border-radius: 50%; top: 35px; }
        .p-eye.left { left: 20px; transform: rotate(-15deg); } .p-eye.right { right: 20px; transform: rotate(15deg); }
        .p-pupil { position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%; top: 6px; right: 6px; }
        .p-nose { position: absolute; width: 16px; height: 10px; background: #ff6699; border-radius: 50%; top: 68px; left: 47px; }
        .p-blush { position: absolute; width: 18px; height: 10px; background: #ffb3cc; border-radius: 50%; top: 60px; opacity: 0.8; }
        .p-blush.left { left: 8px; } .p-blush.right { right: 8px; }
        
        .p-body { position: absolute; width: 85px; height: 75px; background: #fff; border: 5px solid #ff6699; border-radius: 40% 40% 45% 45%; top: 95px; left: 27px; z-index: 2; }
        
        .p-leg { position: absolute; width: 30px; height: 35px; background: #ff6699; border-radius: 10px 10px 20px 20px; top: 150px; z-index: 1; }
        .p-leg.left { left: 35px; } .p-leg.right { right: 35px; }

        .p-arm { position: absolute; width: 30px; height: 45px; background: #ff6699; border: 5px solid #ff6699; top: 100px; z-index: 1; }
        .p-arm.left { left: 8px; border-radius: 20px 0 0 20px; transform: rotate(-35deg); }
        .p-arm.right { right: 8px; border-radius: 0 20px 20px 0; transform: rotate(35deg); }
        
        .p-hand { position: absolute; width: 18px; height: 18px; background: #ff6699; border-radius: 50%; top: 122px; z-index: 4; }
        .p-hand.left { left: 23px; }
        .p-hand.right { right: 23px; }

        .chibi-msg {
            font-size: 26px; margin-top: 40px; font-weight: bold;
            background: rgba(255, 255, 255, 0.95); padding: 12px 28px;
            border-radius: 20px; border: 3px dashed #ff6699;
            box-shadow: 0 0 25px rgba(255, 255, 255, 1);
            position: relative; z-index: 20; color: #ff6699;
            display: inline-block;
        }

        .anim-spin { animation: spinChar 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .anim-dance { animation: danceChar 0.5s infinite alternate ease-in-out; }
        
        @keyframes spinChar { 0% { transform: rotate(0deg) scale(0.5); } 100% { transform: rotate(360deg) scale(1); } }
        @keyframes danceChar { 
            0% { transform: rotate(-10deg) translateY(-5px); } 
            100% { transform: rotate(10deg) translateY(5px); } 
        }

        .sparkle { 
            position: absolute; width: 15px; height: 15px; pointer-events: none; 
            animation: flyOut 0.6s ease-out forwards; z-index: 9999; background-color: #ff99bb;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
        @keyframes flyOut { 0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--mx), var(--my)) scale(0) rotate(180deg); opacity: 0; } }

        /* =========================================
           ระบบปุ่มเลือก ดาโน หรือ โนดา 
           ========================================= */
        .choice-container {
            display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100vh; position: relative;
        }
        .choice-title { font-size: 36px; color: #ff6699; font-weight: bold; margin-bottom: 30px; text-shadow: 2px 2px 0px #fff; text-align: center; z-index: 10; }
        
        .force-btn {
            padding: 15px 45px; font-size: 26px; font-weight: bold; border-radius: 50px;
            border: 4px solid #ff6699; cursor: pointer; background: white; color: #ff6699;
            box-shadow: 0 8px 0 #ff6699, 0 15px 20px rgba(0,0,0,0.1); transition: all 0.2s, font-size 0.3s ease, padding 0.3s ease;
            margin: 15px; z-index: 10; min-width: 180px; text-align: center;
        }
        .force-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #ff6699; }
        #btn-dano.huge-btn { font-size: 45px; padding: 25px 75px; min-width: 280px; background: #ffe6ec; animation: pulseGlow 1.5s infinite alternate; }
        @keyframes pulseGlow { 0% { box-shadow: 0 8px 0 #ff6699, 0 0 10px rgba(255,102,153,0.5); } 100% { box-shadow: 0 8px 0 #ff6699, 0 0 25px rgba(255,102,153,0.9); } }

        /* =========================================
           ✨ POPUP MODAL (กรอบนอกชมพู กรอบในขาว ตัวหนังสือชมพูนม)
           ========================================= */
        .popup-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); justify-content: center; align-items: center;
            z-index: 99999; animation: fadeInPopup 0.3s ease;
        }
        .popup-outer-border {
            background: #ff6699; padding: 3px; border-radius: 24px;
            box-shadow: 0 10px 30px rgba(255, 102, 153, 0.4);
            width: 85%; max-width: 360px; position: relative;
        }
        .popup-content {
            background: #ffffff; border-radius: 21px; padding: 40px 20px 30px 20px;
            text-align: center; font-size: 26px; font-weight: bold; color: #ffb3cc;
        }
        .popup-close-btn {
            position: absolute; top: 12px; right: 15px; font-size: 24px; cursor: pointer;
            color: #ff6699; transition: transform 0.2s; background: none; border: none; font-weight: bold;
        }
        .popup-close-btn:hover { transform: scale(1.1); }
        @keyframes fadeInPopup { from { opacity: 0; } to { opacity: 1; } }

        /* =========================================
           หน้าเล่นเพลงและรูปภาพตามสั่ง 🌊💖
           ========================================= */
        #page-music-player {
            width: 100%; height: 100vh; overflow: hidden; position: relative;
            background-color: #000;
        }
        
        .fireworks-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/tMgxSwn6/97940-B00-CD73-4515-9-F58-7363981-D2-C16.gif');
            background-size: cover; background-position: center; z-index: 1; opacity: 1;
        }

        .horizontal-frame-container {
            position: relative; width: 90%; max-width: 440px; height: 260px;
            background-image: url('https://i.ibb.co/cPLS3qH/IMG-1795.jpg');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            display: flex; justify-content: center; align-items: center;
            z-index: 5; margin-bottom: 20px;
            border: 6px solid #ffffff; 
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.7), 0 15px 35px rgba(0,0,0,0.5); 
            border-radius: 20px;
        }
        
        .vinyl-record {
            width: 170px; height: 170px; 
            background: repeating-radial-gradient(#333333, #333333 6px, #222222 7px, #111111 12px);
            border-radius: 50%; border: 4px solid rgba(255, 255, 255, 0.9); 
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            display: flex; justify-content: center; align-items: center;
            animation: spinRecord 4s linear infinite;
        }
        
        .vinyl-center { 
            width: 75px; height: 75px; background: #fff; border-radius: 50%; 
            border: 2px solid #fff; display: flex; justify-content: center; align-items: center; 
            overflow: hidden; position: relative;
            box-shadow: 0 0 8px rgba(0,0,0,0.2);
        }
        .vinyl-center img { width: 100%; height: 100%; object-fit: cover; }
        .vinyl-hole { position: absolute; width: 10px; height: 10px; background: #ffffff; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); }
        
        @keyframes spinRecord { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .neon-pinyin-text {
            font-size: 38px; font-weight: bold; color: #fff; text-align: center;
            z-index: 5; margin-bottom: 25px; letter-spacing: 2px;
            text-shadow: 0 0 7px #fff, 0 0 10px #ff3399, 0 0 21px #ff3399, 0 0 42px #ff3399;
            animation: neonPulse 1.5s ease-in-out infinite alternate;
        }
        @keyframes neonPulse {
            from { text-shadow: 0 0 7px #fff, 0 0 10px #ff3399, 0 0 21px #ff3399, 0 0 35px #ff3399; }
            to { text-shadow: 0 0 4px #fff, 0 0 7px #ff3399, 0 0 14px #ff3399, 0 0 25px #ff3399; }
        }

        .floating-text {
            position: absolute; font-weight: bold; pointer-events: none;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff, 0 5px 15px rgba(255,105,180,0.4);
            animation: fallAndFade linear forwards; z-index: 6; white-space: nowrap;
        }
        
        .floating-heart {
            position: absolute; pointer-events: none; z-index: 6; font-size: 20px;
            animation: floatUp 5s linear forwards;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.8));
        }

        .cute-char {
            position: absolute; font-size: 55px; z-index: 7;
            animation: bobbing 2s infinite alternate ease-in-out;
            filter: drop-shadow(0 5px 5px rgba(255,105,180,0.3));
        }
        .char-left { left: 8vw; bottom: 12vh; animation-delay: 0s; }
        .char-right { right: 8vw; bottom: 15vh; animation-delay: 1s; }

        @keyframes fallAndFade {
            0% { transform: translateY(-10vh) translateX(0) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) translateX(var(--moveX)) scale(1.2); opacity: 0; }
        }
        
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5) rotate(-20deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5) rotate(20deg); opacity: 0; }
        }

        @keyframes bobbing {
            0% { transform: translateY(0) rotate(-10deg); }
            100% { transform: translateY(-25px) rotate(10deg); }
        }
    </style>
</head>
<body>

    <div style="position:fixed; top:10%; left:10%; font-size:30px; opacity:0.3; z-index:-10;">🎋</div>
    <div style="position:fixed; top:70%; left:5%; font-size:30px; opacity:0.3; z-index:-10;">🌿</div>
    <div style="position:fixed; top:20%; right:10%; font-size:30px; opacity:0.3; z-index:-10;">🐾</div>
    <div style="position:fixed; top:80%; right:15%; font-size:30px; opacity:0.3; z-index:-10;">🎋</div>

    <div id="page-main" class="page-section active">
        <div class="main-container">
            <h1>🐾 Panda Space 🐾</h1>
            
            <div class="image-frame">
                <div class="image-frame-inner">
                    <img src="https://i.ibb.co/4wmcZfB2/IMG-1756.jpg" alt="Image 1" id="img1" class="active">
                    <img src="https://i.ibb.co/wFZmn0hL/IMG-1757.jpg" alt="Image 2" id="img2">
                </div>
            </div>

            <button class="btn" id="btn-switch" onclick="switchImage(this)">🔄 สลับรูปภาพ</button>
            <hr style="border: 0; height: 2px; background: #ffe6ec; margin: 25px 0; border-radius: 2px;">

            <a href="https://www.instagram.com/sdxzwcz.x?igsh=amJlN3k4d3l6OGhx&utm_source=qr" target="_blank" class="btn plat-btn" onclick="selectBtn(this)">📸 Instagram</a>
            <a href="https://www.threads.com/@zczexx.o0?igshid=NTc4MTIwNjQ2YQ==" target="_blank" class="btn plat-btn" onclick="selectBtn(this)">🧵 Threads 1</a>
            <a href="https://www.threads.com/@xdijlan.xx?igshid=NTc4MTIwNjQ2YQ==" target="_blank" class="btn plat-btn" onclick="selectBtn(this)">🧸 Threads 2 (แอครอง)</a>

            <button class="btn btn-next" onclick="goToLoading('page-menu')">หน้าต่อไป ➔</button>

            <div class="paw left"><div class="paw-center"></div><div class="paw-pad"></div></div>
            <div class="paw right"><div class="paw-center"></div><div class="paw-pad"></div></div>
        </div>
    </div>

    <div id="page-loading" class="page-section loading-bg">
        <div class="loader"></div>
        <div class="loading-text">กำลังดาวน์โหลดแป๊บนึง...</div>
    </div>

    <div id="page-strawberry-loading" class="page-section" style="background: #ffffff; z-index: 9999;">
        <div class="progress-container">
            <div class="progress-bar" id="str-bar"></div>
            <div class="progress-strawberry" id="str-berry">🍓</div>
        </div>
        <div class="progress-num" id="str-num">0%</div>
        <div class="loading-text" style="color: #ff6699; margin-top: 15px;">กำลังเปิดเครื่องเล่นเพลงรัก...</div>
    </div>

    <div id="page-menu" class="page-section">
        <div class="menu-title">เลือกอ่านเลยครับ 🐼</div>
        <button class="floating-btn" onclick="openReading('intro')">✨ การแนะนำตัว</button>
        <button class="floating-btn" onclick="openReading('hobby')">🎮 งานอดิเรก</button>
    </div>

    <div id="page-reading" class="page-section">
        <div class="reading-box">
            <h2 class="reading-title" id="read-title">หัวข้อ</h2>
            <div class="scroll-content" id="read-content"></div>
            
            <button class="btn btn-back" onclick="goToPage('page-menu')">⬅️ กลับไปเลือกใหม่</button>
            <button class="btn btn-finish" onclick="goToEndLoading()">อ่านจบแล้ว (ไปต่อ) ➔</button>
        </div>
    </div>

    <div id="page-loading-white" class="page-section" style="background: white; z-index: 999;">
        <div class="loader" style="border-top: 6px solid #ff99bb;"></div>
        <div class="loading-text" style="color: #ff6699;">กำลังเตรียมความพร้อม...</div>
    </div>

    <div id="page-dance" class="page-section">
        <div class="chibi-container" id="panda-dance-box">
            <div class="chibi-panda" id="myPanda">
                <div class="p-ear left"></div>
                <div class="p-ear right"></div>
                <div class="p-head">
                    <div class="p-eye left"><div class="p-pupil"></div></div>
                    <div class="p-eye right"><div class="p-pupil"></div></div>
                    <div class="p-blush left"></div>
                    <div class="p-blush right"></div>
                    <div class="p-nose"></div>
                </div>
                
                <div class="p-arm left"></div>
                <div class="p-arm right"></div>
                
                <div class="p-body"></div>
                
                <div class="p-hand left"></div>
                <div class="p-hand right"></div>
                
                <div class="p-leg left"></div>
                <div class="p-leg right"></div>
            </div>
            <div>
                <div class="chibi-msg">มีอะไรจะให้เลือกแหละ! 🐼💕</div>
            </div>
        </div>

        <div class="choice-container" id="choice-box">
            <div class="choice-title">“ ดาโน หรือ โนดา ”</div>
            <div style="display: flex; justify-content: center; align-items: center; flex-direction: column; width: 100%; min-height: 200px; position: relative;">
                <button class="force-btn" id="btn-dano" onclick="selectDano()">ดาโน</button>
                <button class="force-btn" id="btn-noda" onclick="clickNoda()">โนดา</button>
            </div>
        </div>
    </div>

    <div id="noda-popup" class="popup-overlay">
        <div class="popup-outer-border">
            <button class="popup-close-btn" onclick="closePopup()">❌</button>
            <div class="popup-content">
                แน่ใจแล้วหรอ? เลือกใหม่!
            </div>
        </div>
    </div>

    <div id="page-music-player" class="page-section">
        <div class="fireworks-bg"></div>
        <div class="cute-char char-left">🐰🌷</div>
        <div class="cute-char char-right">🧸🎀</div>

        <div class="horizontal-frame-container">
            <div class="vinyl-record">
                <div class="vinyl-center">
                    <img src="https://i.ibb.co/CsJsrCYg/IMG-1793.jpg" alt="IMG-1793"> <div class="vinyl-hole"></div>
                </div>
            </div>
        </div>

        <div class="neon-pinyin-text">“ Wǒ ài nǐ ”</div>
        <h1 style="color: #ffffff; font-size: 34px; z-index: 5; text-shadow: 0 0 10px #ff3399, 0 0 20px rgba(255,255,255,0.8);">Now Playing... 🎵</h1>
    </div>

    <audio id="myAudio" src="https://rural-black-xyaiq8ih.edgeone.dev/v14044g50000d3h11c7og65in45sue5g.mp3"></audio>

    <script>
        const texts = {
            'intro': {
                title: 'การแนะนำตัว',
                content: 'กูชื่อดาเรียน ปีเกิด 011 รุ้ดได้ไม่ซี 92mu ทุกคน<br><br>อันนี้กูอยากบอกถึงมึงจะไม่ถามกันก็เถอะ เห็นแบบนี้กูอยู่บ้านเขียว infp ครับ'
            },
            'hobby': {
                title: 'งานอดิเรก',
                content: 'กูชอบเขียนโค้ด หาเมคไปทั่วส่วนใหญ่โม้คแทนเมค แล้วก็เรื้อนจับคนอื่นทำเมียไปทั่วครับ<br><br>แต่ถามว่ากุสนมั้ย หึไม่ จริงๆกุมีเมียหลวงชื่อโน- อะแฮ่ม แล้วแต่จะคิดวะ พวกเมียน้อยกุหมด'
            }
        };

        let textInterval;
        let heartInterval;

        function switchImage(button) {
            selectBtn(button);
            const img1 = document.getElementById('img1');
            const img2 = document.getElementById('img2');
            if(img1.classList.contains('active')) {
                img1.classList.remove('active');
                img2.classList.add('active');
            } else {
                img2.classList.remove('active');
                img1.classList.add('active');
            }
        }

        function selectBtn(element) { element.classList.toggle('selected'); }

        function hideAllPages() {
            document.querySelectorAll('.page-section').forEach(page => { page.classList.remove('active'); });
        }

        function goToPage(pageId) {
            hideAllPages();
            document.getElementById(pageId).classList.add('active');
        }

        function goToLoading(nextPageId) {
            goToPage('page-loading');
            setTimeout(() => { goToPage(nextPageId); }, 1500); 
        }

        function openReading(type) {
            document.getElementById('read-title').innerHTML = texts[type].title;
            document.getElementById('read-content').innerHTML = texts[type].content;
            goToPage('page-reading');
        }

        function goToEndLoading() {
            goToPage('page-loading-white');
            setTimeout(() => {
                goToPage('page-dance');
                startPandaDance();
            }, 1500); 
        }

        function startPandaDance() {
            const panda = document.getElementById('myPanda');
            panda.classList.remove('anim-dance');
            panda.classList.add('anim-spin');
            
            setTimeout(() => {
                panda.classList.remove('anim-spin');
                panda.classList.add('anim-dance');
                
                setTimeout(() => {
                    document.getElementById('panda-dance-box').style.display = 'none';
                    document.getElementById('choice-box').style.display = 'flex';
                }, 2000);

            }, 1000);
        }

        // ระบบปุ่มโนดารอบใหม่ เด้งป๊อบอัพ เพลงไม่เล่น
        function clickNoda() {
            document.getElementById('noda-popup').style.display = 'flex';
        }

        function closePopup() {
            document.getElementById('noda-popup').style.display = 'none';
        }

        // เมื่อกด ดาโน จะไปหน้าหลอดสตรอว์เบอร์รี่
        function selectDano() {
            goToPage('page-strawberry-loading');
            
            let progress = 0;
            const bar = document.getElementById('str-bar');
            const berry = document.getElementById('str-berry');
            const num = document.getElementById('str-num');
            
            const loadingInterval = setInterval(() => {
                progress += 5;
                bar.style.width = progress + '%';
                berry.style.left = progress + '%';
                num.innerText = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(loadingInterval);
                    setTimeout(() => {
                        playMusicFinal();
                    }, 400);
                }
            }, 100);
        }

        function playMusicFinal() {
            goToPage('page-music-player');
            const audio = document.getElementById('myAudio');
            audio.play();

            textInterval = setInterval(createFloatingText, 600);
            heartInterval = setInterval(createFloatingHeart, 300);

            audio.onended = function() {
                clearInterval(textInterval);
                clearInterval(heartInterval);
            };
        }

        function createFloatingText() {
            const words = ['ดาโน', 'ไอ้ดารักเมียที่สุดในโลก'];
            const randomWord = words[Math.floor(Math.random() * words.length)];
            
            const textElem = document.createElement('div');
            textElem.classList.add('floating-text');
            textElem.innerText = randomWord;

            const startX = Math.random() * 100;
            const moveX = (Math.random() - 0.5) * 40; 
            const duration = Math.random() * 3 + 3; 
            const fontSize = Math.floor(Math.random() * 16) + 24; 

            textElem.style.left = startX + 'vw';
            textElem.style.fontSize = fontSize + 'px';
            textElem.style.animationDuration = duration + 's';
            textElem.style.setProperty('--moveX', moveX + 'vw');
            
            const colors = ['#ff1a75', '#ffffff', '#ff66b2', '#ffff99', '#66ffff'];
            textElem.style.color = colors[Math.floor(Math.random() * colors.length)];

            document.getElementById('page-music-player').appendChild(textElem);
            textElem.addEventListener('animationend', function() { textElem.remove(); });
        }

        function createFloatingHeart() {
            const hearts = ['💖', '💗', '🩷', '💕', '🌸', '✨'];
            const randomHeart = hearts[Math.floor(Math.random() * hearts.length)];
            
            const heartElem = document.createElement('div');
            heartElem.classList.add('floating-heart');
            heartElem.innerText = randomHeart;

            const startX = Math.random() * 100;
            const duration = Math.random() * 3 + 4; 
            const size = Math.floor(Math.random() * 15) + 15; 

            heartElem.style.left = startX + 'vw';
            heartElem.style.fontSize = size + 'px';
            heartElem.style.animationDuration = duration + 's';

            document.getElementById('page-music-player').appendChild(heartElem);
            heartElem.addEventListener('animationend', function() { heartElem.remove(); });
        }

        document.addEventListener('click', function(e) {
            // ป้องกันเอฟเฟกต์ประกายไฟซ้อนกันเมื่อกดปิดป๊อบอัพ
            if (e.target.classList.contains('popup-close-btn') || e.target.closest('.popup-outer-border')) return;

            for (let i = 0; i < 5; i++) {
                const sparkle = document.createElement('div');
                sparkle.classList.add('sparkle');
                sparkle.style.left = (e.pageX - 7) + 'px';
                sparkle.style.top = (e.pageY - 7) + 'px';
                
                const mx = (Math.random() - 0.5) * 120 + 'px';
                const my = (Math.random() - 0.5) * 120 + 'px';
                sparkle.style.setProperty('--mx', mx);
                sparkle.style.setProperty('--my', my);
                
                const colors = ['#ffffff', '#ffccd5', '#ff99bb'];
                sparkle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                document.body.appendChild(sparkle);
                sparkle.addEventListener('animationend', function() { sparkle.remove(); });
            }
        });
    </script>
</body>
</html>
